<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sketchify AI</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
}

body{
font-family:'Outfit',sans-serif;
background:#05060d;
color:white;
overflow-x:hidden;
min-height:100vh;
}

/* BACKGROUND */

.bg-glow{
position:fixed;
width:700px;
height:700px;
background:radial-gradient(circle,#6c5ce755 0%,transparent 70%);
top:-250px;
right:-200px;
z-index:-1;
filter:blur(80px);
}

.bg-glow2{
position:fixed;
width:700px;
height:700px;
background:radial-gradient(circle,#00cec955 0%,transparent 70%);
bottom:-250px;
left:-200px;
z-index:-1;
filter:blur(80px);
}

/* APP */

.app{
width:100%;
padding:70px 30px 120px;
}

/* HERO */

.hero{
text-align:center;
margin-bottom:60px;
animation:fadeUp 1s ease;
}

.logo{
font-size:30px;
font-weight:700;
margin-bottom:20px;
}

.logo span{
background:linear-gradient(to right,#00cec9,#6c5ce7);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.hero h1{
font-size:78px;
line-height:1;
margin-bottom:25px;
font-weight:700;
}

.hero h1 span{
background:linear-gradient(to right,#00cec9,#6c5ce7);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.hero p{
max-width:850px;
margin:auto;
color:#9aa0b5;
font-size:19px;
line-height:1.8;
}

/* CARD */

.card{
width:100%;
max-width:1350px;
margin:auto;
background:rgba(255,255,255,0.04);
border:1px solid rgba(255,255,255,0.08);
backdrop-filter:blur(20px);
border-radius:35px;
padding:35px;
box-shadow:0 20px 80px rgba(0,0,0,0.45);
animation:fadeUp 1s ease;
}

/* FORM */

.form{
display:flex;
gap:20px;
margin-bottom:35px;
}

textarea{
flex:1;
height:130px;
background:rgba(255,255,255,0.04);
border:1px solid rgba(255,255,255,0.05);
outline:none;
padding:22px;
border-radius:24px;
color:white;
font-size:17px;
resize:none;
transition:0.3s;
}

textarea:focus{
border:1px solid rgba(0,206,201,0.5);
box-shadow:0 0 25px rgba(0,206,201,0.2);
}

textarea::placeholder{
color:#6e7489;
}

button{
width:240px;
border:none;
border-radius:24px;
background:linear-gradient(135deg,#00b894,#6c5ce7);
color:white;
font-size:18px;
font-weight:600;
cursor:pointer;
transition:0.3s;
box-shadow:0 10px 40px rgba(108,92,231,0.35);
}

button:hover{
transform:translateY(-4px) scale(1.02);
}

button:disabled{
opacity:0.7;
cursor:not-allowed;
}

/* WORKSPACE */

.workspace{
height:820px;
background:rgba(255,255,255,0.03);
border-radius:35px;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
position:relative;
border:1px solid rgba(255,255,255,0.05);
}

/* IMAGE */

.workspace img{
width:100%;
height:100%;
object-fit:contain;
display:none;
animation:fadeIn 0.5s ease;
}

/* LOADER */

.loader{
display:none;
flex-direction:column;
align-items:center;
}

.spinner{
width:90px;
height:90px;
border:6px solid rgba(255,255,255,0.08);
border-top:6px solid #00cec9;
border-radius:50%;
animation:spin 1s linear infinite;
}

.loader p{
margin-top:22px;
color:#d7d7d7;
font-size:17px;
}

/* PLACEHOLDER */

.placeholder{
text-align:center;
color:#6e7489;
font-size:24px;
padding:20px;
}

.placeholder svg{
margin-bottom:25px;
opacity:0.7;
}

/* DOWNLOAD BUTTON */

.download-btn{
display:none;
position:absolute;
bottom:30px;
right:30px;
padding:14px 24px;
border:none;
border-radius:18px;
background:linear-gradient(135deg,#00b894,#6c5ce7);
color:white;
font-weight:600;
font-size:16px;
cursor:pointer;
box-shadow:0 10px 30px rgba(108,92,231,0.4);
transition:0.3s;
}

.download-btn:hover{
transform:translateY(-3px);
}

/* ANIMATIONS */

@keyframes spin{
100%{
transform:rotate(360deg);
}
}

@keyframes fadeIn{
from{
opacity:0;
transform:scale(0.98);
}
to{
opacity:1;
transform:scale(1);
}
}

@keyframes fadeUp{
from{
opacity:0;
transform:translateY(40px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* RESPONSIVE */

@media(max-width:950px){

.hero h1{
font-size:50px;
}

.form{
flex-direction:column;
}

button{
width:100%;
height:70px;
}

.workspace{
height:550px;
}

}

</style>

</head>

<body>

<div class="bg-glow"></div>
<div class="bg-glow2"></div>

<div class="app">

<!-- HERO -->

<section class="hero">

<div class="logo">
Sketchify <span>AI</span>
</div>

<h1>
Generate Stunning
<span>AI Images</span>
</h1>

<p>
Create beautiful AI generated artwork instantly using your custom trained model.
Type your imagination and generate professional visuals in seconds.
</p>

</section>

<!-- MAIN CARD -->

<div class="card">

<form id="generateForm">

<div class="form">

<textarea
id="promptInput"
placeholder="Describe your imagination..."
required
></textarea>

<button
type="submit"
id="generateBtn"
>
Generate Image
</button>

</div>

</form>

<!-- WORKSPACE -->

<div class="workspace">

<!-- PLACEHOLDER -->

<div class="placeholder" id="placeholder">

<svg width="110" height="110" fill="none" stroke="#6c5ce7" stroke-width="1.5" viewBox="0 0 24 24">

<path stroke-linecap="round" stroke-linejoin="round"
d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14">
</path>

<path stroke-linecap="round" stroke-linejoin="round"
d="M14 8h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z">
</path>

</svg>

<div>
Your generated image will appear here
</div>

</div>

<!-- LOADER -->

<div class="loader" id="loader">

<div class="spinner"></div>

<p>
Generating AI Image...
</p>

</div>

<!-- IMAGE -->

<img id="generatedImage">

<!-- DOWNLOAD -->

<button
id="downloadBtn"
class="download-btn"
type="button"
>
Download Image
</button>

</div>

</div>

</div>

<script>

const form =
document.getElementById("generateForm");

const loader =
document.getElementById("loader");

const placeholder =
document.getElementById("placeholder");

const image =
document.getElementById("generatedImage");

const button =
document.getElementById("generateBtn");

const promptInput =
document.getElementById("promptInput");

const downloadBtn =
document.getElementById("downloadBtn");

/* GENERATE IMAGE */

form.addEventListener("submit", async function(e){

e.preventDefault();

const prompt = promptInput.value.trim();

if(prompt === ""){
return;
}

loader.style.display = "flex";

placeholder.style.display = "none";

image.style.display = "none";

downloadBtn.style.display = "none";

button.innerHTML = "Generating...";

button.disabled = true;

window.scrollTo({
top:document.body.scrollHeight,
behavior:"smooth"
});

try{

const response = await fetch(

"http://127.0.0.1:5000/generate",

{
method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
prompt:prompt
})

}

);

const data = await response.json();

if(data.success){

const imageUrl =
data.image_url + "?t=" + new Date().getTime();

image.src = imageUrl;

image.onload = ()=>{

loader.style.display = "none";

image.style.display = "block";

button.innerHTML = "Generate Image";

button.disabled = false;

downloadBtn.style.display = "block";

};

}

else{

alert(data.error);

loader.style.display = "none";

placeholder.style.display = "block";

button.innerHTML = "Generate Image";

button.disabled = false;

}

}

catch(error){

console.log(error);

alert("Backend connection failed");

loader.style.display = "none";

placeholder.style.display = "block";

button.innerHTML = "Generate Image";

button.disabled = false;

}

});

/* ENTER KEY */

promptInput.addEventListener("keydown", function(e){

if(e.key === "Enter" && !e.shiftKey){

e.preventDefault();

form.requestSubmit();

}

});

/* DOWNLOAD IMAGE */

downloadBtn.addEventListener("click", async function(){

try{

const response = await fetch(image.src);

const blob = await response.blob();

const blobUrl = window.URL.createObjectURL(blob);

const a = document.createElement("a");

a.href = blobUrl;

a.download = "sketchify-image.png";

document.body.appendChild(a);

a.click();

a.remove();

window.URL.revokeObjectURL(blobUrl);

}

catch(error){

alert("Download failed");

console.log(error);

}

});

</script>

</body>

</html>
